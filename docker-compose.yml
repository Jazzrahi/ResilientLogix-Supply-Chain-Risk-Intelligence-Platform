version: '3.8'

services:
  # PostGIS Database
  db:
    image: postgis/postgis:15-3.3
    container_name: resilientlogix_db
    environment:
      POSTGRES_USER: resilient_user
      POSTGRES_PASSWORD: resilient_password
      POSTGRES_DB: resilientlogix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: resilientlogix_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://resilient_user:resilient_password@db:5432/resilientlogix
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
